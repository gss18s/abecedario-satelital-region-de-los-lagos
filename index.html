<!DOCTYPE html>
<html>
<head>
  <title>ABCEDARIO - Región de Los Lagos</title>

  <style>
    body {
      font-family: "Times New Roman", serif;
      text-align: center;
      background: white;
    }

    h1 {
      font-size: 40px;
    }

    input, button {
      font-family: "Times New Roman", serif;
      font-size: 18px;
      padding: 10px;
      margin: 5px;
    }

    #resultado {
      margin-top: 20px;
    }

    .bloque {
      display: inline-block;
      position: relative;
      margin: 3px;
    }

    .bloque img {
      width: 120px;
      height: 120px;
      object-fit: cover;
    }

    /* TEXTO OCULTO */
    .texto {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 12px;
      opacity: 0;
      transition: 0.3s;
    }

    /* APARECE AL PASAR EL CURSOR */
    .bloque:hover .texto {
      opacity: 1;
    }

    .espacio {
      display: inline-block;
      width: 40px;
    }

    /* CRÉDITO */
    .credito {
      position: fixed;
      bottom: 10px;
      right: 15px;
      font-size: 12px;
      color: rgba(0,0,0,0.6);
      font-family: "Times New Roman", serif;
    }

  </style>
</head>

<body>

<h1>e s c r i b e</h1>

<input type="text" id="texto">
<br>
<button onclick="mostrar()">ver</button>

<div id="resultado"></div>

<!-- CRÉDITO -->
<div class="credito">
  Imágenes satelitales: QGIS – ESRI Satelite
</div>

<script>

const imagenes = {
  A: { src: "img/a1.jpg", lugar: "Río Puntiagudo" },
  B: { src: "img/b1.jpg", lugar: "Río Reñihue" },
  C: { src: "img/c1.jpg", lugar: "Volcán Osorno" },
  D: { src: "img/d1.jpg", lugar: "Río Puelo" },
  E: { src: "img/e1.jpg", lugar: "Río Vihuela" },
  F: { src: "img/f1.jpg", lugar: "Cordillera Nevada" },
  G: { src: "img/g1.jpg", lugar: "Isla Cailín" },
  H: { src: "img/h1.jpg", lugar: "Ancud" },
  I: { src: "img/i1.jpg", lugar: "Lago Tagua Tagua" },
  J: { src: "img/j1.jpg", lugar: "Playa Chepu" },
  K: { src: "img/k1.jpg", lugar: "Río Blanco" },
  L: { src: "img/l1.jpg", lugar: "Río Rahue" },
  M: { src: "img/m1.jpg", lugar: "Río Butalcura" },
  N: { src: "img/n1.jpg", lugar: "Lago Yelcho" },
  Ñ: { src: "img/n2.jpg", lugar: "Río Manso" },
  O: { src: "img/o1.jpg", lugar: "Laguna Tachyeres" },
  P: { src: "img/p1.jpg", lugar: "Puerto Inglés" },
  Q: { src: "img/q1.jpg", lugar: "Rahue Alto" },
  R: { src: "img/r1.jpg", lugar: "Volcán Michimahuida" },
  S: { src: "img/s1.jpg", lugar: "Río Negro" },
  T: { src: "img/t1.jpg", lugar: "Punta Mutrico" },
  U: { src: "img/u1.jpg", lugar: "Río Barceló" },
  V: { src: "img/v1.jpg", lugar: "Valle – Lago Cormaz Vidal" },
  W: { src: "img/w1.jpg", lugar: "Río Vodudahue" },
  X: { src: "img/x1.jpg", lugar: "Río Puntra" },
  Y: { src: "img/y1.jpg", lugar: "Río Huicha" },
  Z: { src: "img/z1.jpg", lugar: "Lago El Palmar" }
};

function mostrar() {

  const palabra = document.getElementById("texto").value.toUpperCase();
  const contenedor = document.getElementById("resultado");

  contenedor.innerHTML = "";

  for (let letra of palabra) {

    if (letra === " ") {
      const espacio = document.createElement("div");
      espacio.className = "espacio";
      contenedor.appendChild(espacio);
      continue;
    }

    if (!imagenes[letra]) continue;

    const info = imagenes[letra];

    const cont = document.createElement("div");
    cont.className = "bloque";

    const img = document.createElement("img");
    img.src = info.src;

    const texto = document.createElement("div");
    texto.className = "texto";
    texto.innerText = info.lugar;

    cont.appendChild(img);
    cont.appendChild(texto);

    contenedor.appendChild(cont);
  }
}

</script>

</body>
</html>
